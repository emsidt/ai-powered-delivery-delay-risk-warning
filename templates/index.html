<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Dự đoán rủi ro giao hàng trễ</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --border: #cbd5e1;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eff6ff;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      color: var(--text);
      line-height: 1.4;
    }

    .container {
      max-width: 1180px;
      min-height: calc(100vh - 32px);
      margin: auto;
      background: var(--surface);
      padding: 22px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 60px;
    }

    h2 {
      text-align: center;
      margin: 0;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
      position: relative;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.75fr);
      gap: 22px;
      min-height: 0;
      align-items: stretch;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }

    .field {
      min-width: 0;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 13px;
      color: #0f172a;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: #fbfdff;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .field-error {
      display: none;
      margin-top: 5px;
      color: var(--danger);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
    }

    .field.has-error input {
      border-color: var(--danger);
      background: #fff7f7;
    }

    .field.has-error .field-error {
      display: block;
    }

    button {
      margin-top: 18px;
      width: auto;
      min-width: 210px;
      min-height: 46px;
      padding: 11px 26px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      background: var(--primary-dark);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .actions {
      display: flex;
      justify-content: center;
    }

    .result {
      height: 100%;
      padding: 24px;
      border-radius: 10px;
      background: var(--primary-soft);
      border: 1px solid #bfdbfe;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .result h3 {
      margin: 0 0 4px;
      font-size: 20px;
      color: #0f172a;
    }

    .result p {
      margin: 0;
      line-height: 1.45;
      color: #1e293b;
    }

    .result-value {
      display: inline-block;
      margin-top: 4px;
      padding: 4px 0;
      font-size: 18px;
    }

    .score {
      display: inline-block;
      margin-top: 4px;
      font-size: 44px;
      line-height: 1;
      font-weight: bold;
      color: var(--primary);
    }

    .warning {
      color: var(--danger);
      font-weight: bold;
    }

    .safe {
      color: var(--success);
      font-weight: bold;
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .container {
        min-height: auto;
      }

      .workspace,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Hệ thống AI cảnh báo rủi ro giao hàng trễ</h2>

  <div class="workspace">
    <div>
      <div class="form-grid">
        <div class="field">
          <label>Tên mặt hàng</label>
          <select id="ten_mat_hang">
            <option>Hạt cà phê</option>
            <option>Sữa bột</option>
            <option>Đường</option>
            <option>Siro</option>
            <option>Ly giấy</option>
            <option>Nắp nhựa</option>
            <option>Khăn giấy</option>
            <option>Bút</option>
            <option>Giấy in</option>
          </select>
        </div>

        <div class="field">
          <label>Nhóm mặt hàng</label>
          <select id="nhom_mat_hang">
            <option>Nguyên liệu pha chế</option>
            <option>Bao bì</option>
            <option>Vật tư vệ sinh</option>
            <option>Văn phòng phẩm</option>
          </select>
        </div>

        <div class="field">
          <label>Mức độ ưu tiên</label>
          <select id="muc_do_uu_tien">
            <option>Cao</option>
            <option>Trung bình</option>
            <option>Thấp</option>
          </select>
        </div>

        <div class="field">
          <label>Hàng quan trọng</label>
          <select id="hang_quan_trong">
            <option>Có</option>
            <option>Không</option>
          </select>
        </div>

        <div class="field">
          <label>Thời gian giao</label>
          <input type="datetime-local" id="thoi_gian_giao" value="2024-05-20T08:30" />
        </div>

        <div class="field">
          <label>Địa điểm giao/kho</label>
          <select id="dia_diem">
            <option>Kho TP.HCM</option>
            <option>Kho Hà Nội</option>
            <option>Kho Đà Nẵng</option>
            <option>Kho Cần Thơ</option>
          </select>
        </div>

        <div class="field">
          <label>Giá trị giao dịch</label>
          <input type="text" id="gia_tri_giao_dich" value="1200" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Tần suất mua hàng</label>
          <input type="text" id="tan_suat_mua_hang" value="8" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Mức tồn kho hiện tại</label>
          <input type="text" id="muc_ton_kho" value="50" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Tồn kho an toàn</label>
          <input type="text" id="ton_kho_an_toan" value="80" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Nhiệt độ</label>
          <input type="text" id="nhiet_do" value="30" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Độ ẩm</label>
          <input type="text" id="do_am" value="70" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Tình trạng giao thông</label>
          <select id="tinh_trang_giao_thong">
            <option>Thông thoáng</option>
            <option>Ùn tắc</option>
            <option>Đường vòng</option>
          </select>
        </div>

        <div class="field">
          <label>Thời gian chờ hiện tại</label>
          <input type="text" id="thoi_gian_cho" value="2" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Ngưỡng chịu trễ giờ</label>
          <input type="text" id="nguong_chiu_tre" value="4" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Mức sử dụng phương tiện</label>
          <input type="text" id="muc_su_dung_phuong_tien" value="0.75" inputmode="decimal" />
        </div>

        <div class="field">
          <label>Dự báo nhu cầu</label>
          <input type="text" id="du_bao_nhu_cau" value="120" inputmode="decimal" />
        </div>
      </div>

      <div class="actions">
        <button onclick="duDoan()">Dự đoán rủi ro</button>
      </div>
    </div>

    <div class="result" id="resultBox">
      <h3>Kết quả dự đoán</h3>
      <p><b>Trạng thái:</b> <span class="result-value" id="du_doan">Chưa có dữ liệu</span></p>
      <p><b>Risk Score:</b> <span class="score" id="risk_score">--</span></p>
      <p><b>Quyết định cảnh báo:</b> <span class="result-value" id="quyet_dinh">--</span></p>
    </div>
  </div>
</div>

<script>
  const numericInputIds = [
    "gia_tri_giao_dich",
    "tan_suat_mua_hang",
    "muc_ton_kho",
    "ton_kho_an_toan",
    "nhiet_do",
    "do_am",
    "thoi_gian_cho",
    "nguong_chiu_tre",
    "muc_su_dung_phuong_tien",
    "du_bao_nhu_cau"
  ];

  function getField(input) {
    return input.closest(".field");
  }

  function getFieldLabel(input) {
    const label = getField(input).querySelector("label");
    return label ? label.innerText : "Trường này";
  }

  function getFieldError(input) {
    const field = getField(input);
    let error = field.querySelector(".field-error");

    if (!error) {
      error = document.createElement("div");
      error.className = "field-error";
      field.appendChild(error);
    }

    return error;
  }

  function showFieldError(input, message) {
    const field = getField(input);
    const error = getFieldError(input);

    error.innerText = message;
    field.classList.add("has-error");
  }

  function clearFieldError(input) {
    const field = getField(input);
    const error = field.querySelector(".field-error");

    if (error) {
      error.innerText = "";
    }

    field.classList.remove("has-error");
  }

  function clearAllFieldErrors() {
    numericInputIds.forEach((id) => clearFieldError(document.getElementById(id)));
  }

  function isAllowedNumericValue(value) {
    return value === "" || /^\d+(\.\d*)?$/.test(value) || /^\.\d+$/.test(value);
  }

  function getNumericErrorMessage(value) {
    if (/[a-zA-ZÀ-ỹ]/.test(value)) {
      return "Không được nhập chữ.";
    }

    if (value.includes("-")) {
      return "Không được nhập số âm.";
    }

    return "Chỉ được nhập số không âm.";
  }

  function handleNumericBeforeInput(event) {
    if (!event.data || !event.inputType.startsWith("insert")) {
      return;
    }

    const input = event.currentTarget;
    const nextValue =
      input.value.slice(0, input.selectionStart) +
      event.data +
      input.value.slice(input.selectionEnd);

    if (!isAllowedNumericValue(nextValue)) {
      event.preventDefault();
      showFieldError(input, getNumericErrorMessage(event.data));
    }
  }

  function handleNumericKeyDown(event) {
    if (
      event.ctrlKey ||
      event.metaKey ||
      event.altKey ||
      event.key.length > 1
    ) {
      return;
    }

    if (!/[\d.]/.test(event.key)) {
      event.preventDefault();
      showFieldError(event.currentTarget, getNumericErrorMessage(event.key));
    }
  }

  function handleNumericPaste(event) {
    const input = event.currentTarget;
    const pastedText = event.clipboardData.getData("text");

    if (!isAllowedNumericValue(pastedText)) {
      event.preventDefault();
      showFieldError(input, getNumericErrorMessage(pastedText));
    }
  }

  function setupNumericInputs() {
    numericInputIds.forEach((id) => {
      const input = document.getElementById(id);

      input.setAttribute("inputmode", "decimal");
      input.addEventListener("keydown", handleNumericKeyDown);
      input.addEventListener("beforeinput", handleNumericBeforeInput);
      input.addEventListener("paste", handleNumericPaste);
      input.addEventListener("input", () => {
        if (isAllowedNumericValue(input.value)) {
          clearFieldError(input);
          return;
        }

        const message = getNumericErrorMessage(input.value);
        input.value = input.value.replace(/[^\d.]/g, "");
        showFieldError(input, message);
      });
    });
  }

  function getNonNegativeNumber(id) {
    const input = document.getElementById(id);
    const rawValue = input.value.trim();
    const value = Number(rawValue);

    if (rawValue === "") {
      input.focus();
      showFieldError(input, `${getFieldLabel(input)} không được để trống.`);
      throw new Error("Invalid numeric input");
    }

    if (/[a-zA-ZÀ-ỹ]/.test(rawValue)) {
      input.focus();
      showFieldError(input, `${getFieldLabel(input)} không được nhập chữ.`);
      throw new Error("Invalid numeric input");
    }

    if (rawValue.includes("-") || value < 0) {
      input.focus();
      showFieldError(input, `${getFieldLabel(input)} không được nhập số âm.`);
      throw new Error("Invalid numeric input");
    }

    if (!Number.isFinite(value) || !isAllowedNumericValue(rawValue)) {
      input.focus();
      showFieldError(input, `${getFieldLabel(input)} phải là số hợp lệ.`);
      throw new Error("Invalid numeric input");
    }

    clearFieldError(input);
    return value;
  }

  function showError(message) {
    const firstInput = document.getElementById(numericInputIds[0]);
    showFieldError(firstInput, message);
    firstInput.focus();
  }

  async function duDoan() {
    let data;

    try {
      clearAllFieldErrors();
      data = {
      "Tên mặt hàng": document.getElementById("ten_mat_hang").value,
      "Nhóm mặt hàng": document.getElementById("nhom_mat_hang").value,
      "Mức độ ưu tiên": document.getElementById("muc_do_uu_tien").value,
      "Hàng quan trọng": document.getElementById("hang_quan_trong").value,
      "Thời gian giao": document.getElementById("thoi_gian_giao").value,
      "Địa điểm giao/kho": document.getElementById("dia_diem").value,
      "Giá trị giao dịch": getNonNegativeNumber("gia_tri_giao_dich"),
      "Tần suất mua hàng": getNonNegativeNumber("tan_suat_mua_hang"),
      "Số hàng còn tồn kho": getNonNegativeNumber("muc_ton_kho"),
      "Tồn kho an toàn": getNonNegativeNumber("ton_kho_an_toan"),
      "Nhiệt độ": getNonNegativeNumber("nhiet_do"),
      "Độ ẩm": getNonNegativeNumber("do_am"),
      "Tình trạng giao thông": document.getElementById("tinh_trang_giao_thong").value,
      "Thời gian chờ hàng": getNonNegativeNumber("thoi_gian_cho"),
      "Ngưỡng chịu trễ giờ": getNonNegativeNumber("nguong_chiu_tre"),
      "Mức sử dụng phương tiện": getNonNegativeNumber("muc_su_dung_phuong_tien"),
      "Dự báo nhu cầu": getNonNegativeNumber("du_bao_nhu_cau")
      };
    } catch (error) {
      return;
    }

    const response = await fetch("/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (!response.ok) {
      showError(result.error || "Không thể dự đoán.");
      return;
    }

    document.getElementById("du_doan").innerText = result.du_doan_giao_tre;
    document.getElementById("risk_score").innerText = result.risk_score + "%";
    document.getElementById("quyet_dinh").innerText = result.quyet_dinh_canh_bao;

    if (result.du_doan_giao_tre === "Có nguy cơ giao trễ") {
      document.getElementById("du_doan").className = "result-value warning";
    } else {
      document.getElementById("du_doan").className = "result-value safe";
    }
  }

  setupNumericInputs();
</script>

</body>
</html>
