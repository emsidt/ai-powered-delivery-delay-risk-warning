<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Dự đoán rủi ro giao hàng trễ</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --surface: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --border: #cbd5e1;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: #eff6ff;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      color: var(--text);
      line-height: 1.4;
    }

    .container {
      max-width: 1180px;
      min-height: calc(100vh - 32px);
      margin: auto;
      background: var(--surface);
      padding: 22px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 60px;
    }

    h2 {
      text-align: center;
      margin: 0;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
      position: relative;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.75fr);
      gap: 22px;
      min-height: 0;
      align-items: stretch;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }

    .field {
      min-width: 0;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 13px;
      color: #0f172a;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: #fbfdff;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    button {
      margin-top: 18px;
      width: auto;
      min-width: 210px;
      min-height: 46px;
      padding: 11px 26px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.22);
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      background: var(--primary-dark);
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.28);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .actions {
      display: flex;
      justify-content: center;
    }

    .result {
      height: 100%;
      padding: 24px;
      border-radius: 10px;
      background: var(--primary-soft);
      border: 1px solid #bfdbfe;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }

    .result h3 {
      margin: 0 0 4px;
      font-size: 20px;
      color: #0f172a;
    }

    .result p {
      margin: 0;
      line-height: 1.45;
      color: #1e293b;
    }

    .result-value {
      display: inline-block;
      margin-top: 4px;
      padding: 4px 0;
      font-size: 18px;
    }

    .score {
      display: inline-block;
      margin-top: 4px;
      font-size: 44px;
      line-height: 1;
      font-weight: bold;
      color: var(--primary);
    }

    .warning {
      color: var(--danger);
      font-weight: bold;
    }

    .safe {
      color: var(--success);
      font-weight: bold;
    }

    @media (max-width: 820px) {
      body {
        padding: 10px;
      }

      .container {
        min-height: auto;
      }

      .workspace,
      .form-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Hệ thống AI cảnh báo rủi ro giao hàng trễ</h2>

  <div class="workspace">
    <div>
      <div class="form-grid">
        <div class="field">
          <label>Tên mặt hàng</label>
          <select id="ten_mat_hang">
            <option>Hạt cà phê</option>
            <option>Sữa bột</option>
            <option>Đường</option>
            <option>Siro</option>
            <option>Ly giấy</option>
            <option>Nắp nhựa</option>
            <option>Khăn giấy</option>
            <option>Bút</option>
            <option>Giấy in</option>
          </select>
        </div>

        <div class="field">
          <label>Nhóm mặt hàng</label>
          <select id="nhom_mat_hang">
            <option>Nguyên liệu pha chế</option>
            <option>Bao bì</option>
            <option>Vật tư vệ sinh</option>
            <option>Văn phòng phẩm</option>
          </select>
        </div>

        <div class="field">
          <label>Mức độ ưu tiên</label>
          <select id="muc_do_uu_tien">
            <option>Cao</option>
            <option>Trung bình</option>
            <option>Thấp</option>
          </select>
        </div>

        <div class="field">
          <label>Hàng quan trọng</label>
          <select id="hang_quan_trong">
            <option>Có</option>
            <option>Không</option>
          </select>
        </div>

        <div class="field">
          <label>Thời gian giao</label>
          <input type="datetime-local" id="thoi_gian_giao" value="2024-05-20T08:30" />
        </div>

        <div class="field">
          <label>Địa điểm giao/kho</label>
          <select id="dia_diem">
            <option>Kho TP.HCM</option>
            <option>Kho Hà Nội</option>
            <option>Kho Đà Nẵng</option>
            <option>Kho Cần Thơ</option>
          </select>
        </div>

        <div class="field">
          <label>Giá trị giao dịch</label>
          <input type="number" id="gia_tri_giao_dich" value="1200" />
        </div>

        <div class="field">
          <label>Tần suất mua hàng</label>
          <input type="number" id="tan_suat_mua_hang" value="8" />
        </div>

        <div class="field">
          <label>Mức tồn kho hiện tại</label>
          <input type="number" id="muc_ton_kho" value="50" />
        </div>

        <div class="field">
          <label>Tồn kho an toàn</label>
          <input type="number" id="ton_kho_an_toan" value="80" />
        </div>

        <div class="field">
          <label>Nhiệt độ</label>
          <input type="number" id="nhiet_do" value="30" />
        </div>

        <div class="field">
          <label>Độ ẩm</label>
          <input type="number" id="do_am" value="70" />
        </div>

        <div class="field">
          <label>Tình trạng giao thông</label>
          <select id="tinh_trang_giao_thong">
            <option>Thông thoáng</option>
            <option>Ùn tắc</option>
            <option>Đường vòng</option>
          </select>
        </div>

        <div class="field">
          <label>Thời gian chờ hiện tại</label>
          <input type="number" id="thoi_gian_cho" value="2" />
        </div>

        <div class="field">
          <label>Ngưỡng chịu trễ giờ</label>
          <input type="number" id="nguong_chiu_tre" value="4" step="0.5" />
        </div>

        <div class="field">
          <label>Mức sử dụng phương tiện</label>
          <input type="number" id="muc_su_dung_phuong_tien" value="0.75" step="0.01" />
        </div>

        <div class="field">
          <label>Dự báo nhu cầu</label>
          <input type="number" id="du_bao_nhu_cau" value="120" />
        </div>
      </div>

      <div class="actions">
        <button onclick="duDoan()">Dự đoán rủi ro</button>
      </div>
    </div>

    <div class="result" id="resultBox">
      <h3>Kết quả dự đoán</h3>
      <p><b>Trạng thái:</b> <span class="result-value" id="du_doan">Chưa có dữ liệu</span></p>
      <p><b>Risk Score:</b> <span class="score" id="risk_score">--</span></p>
      <p><b>Quyết định cảnh báo:</b> <span class="result-value" id="quyet_dinh">--</span></p>
    </div>
  </div>
</div>

<script>
  async function duDoan() {
    const data = {
      "Tên mặt hàng": document.getElementById("ten_mat_hang").value,
      "Nhóm mặt hàng": document.getElementById("nhom_mat_hang").value,
      "Mức độ ưu tiên": document.getElementById("muc_do_uu_tien").value,
      "Hàng quan trọng": document.getElementById("hang_quan_trong").value,
      "Thời gian giao": document.getElementById("thoi_gian_giao").value,
      "Địa điểm giao/kho": document.getElementById("dia_diem").value,
      "Giá trị giao dịch": Number(document.getElementById("gia_tri_giao_dich").value),
      "Tần suất mua hàng": Number(document.getElementById("tan_suat_mua_hang").value),
      "Số hàng còn tồn kho": Number(document.getElementById("muc_ton_kho").value),
      "Tồn kho an toàn": Number(document.getElementById("ton_kho_an_toan").value),
      "Nhiệt độ": Number(document.getElementById("nhiet_do").value),
      "Độ ẩm": Number(document.getElementById("do_am").value),
      "Tình trạng giao thông": document.getElementById("tinh_trang_giao_thong").value,
      "Thời gian chờ hàng": Number(document.getElementById("thoi_gian_cho").value),
      "Ngưỡng chịu trễ giờ": Number(document.getElementById("nguong_chiu_tre").value),
      "Mức sử dụng phương tiện": Number(document.getElementById("muc_su_dung_phuong_tien").value),
      "Dự báo nhu cầu": Number(document.getElementById("du_bao_nhu_cau").value)
    };

    const response = await fetch("/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("du_doan").innerText = result.du_doan_giao_tre;
    document.getElementById("risk_score").innerText = result.risk_score + "%";
    document.getElementById("quyet_dinh").innerText = result.quyet_dinh_canh_bao;

    if (result.du_doan_giao_tre === "Có nguy cơ giao trễ") {
      document.getElementById("du_doan").className = "result-value warning";
    } else {
      document.getElementById("du_doan").className = "result-value safe";
    }
  }
</script>

</body>
</html>
